# cargo-deny supply-chain policy for Uncrowned King.
#
# Complements the RustSec advisory audit (.github/workflows/security.yml) with
# license, dependency-source, and duplicate/wildcard gates. Run locally with:
#
#     cargo deny check

[graph]
all-features = true

[advisories]
version = 2
# Fail on yanked crates; RustSec vulnerability advisories are also enforced here
# in addition to the dedicated audit workflow.
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses used across the dependency tree, plus GPL-3.0-only, which
# is this project's own workspace license.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "GPL-3.0-only",
]

[bans]
# Duplicate versions are a maintenance smell but not a hard failure; wildcard
# version requirements on crates.io dependencies are rejected. Intra-workspace
# path dependencies (uk-*) are exempt.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
