# Example UK client configuration.

# Prefer the QUIC carrier, falling back to TLS/TCP on the same host:port.
# A bare "host:port" or "tls://host:port" uses TLS/TCP; "quic://host:port"
# uses QUIC. Endpoints are tried in order.
server_addr = "quic://127.0.0.1:9443"
server_addrs = ["tls://127.0.0.1:9443"]
server_name = "localhost"
observability_listen = "127.0.0.1:9091"
ca_cert_path = "server-cert.pem"
key_id = "local-dev"
secret = "replace-with-a-long-random-shared-secret"
handshake_timeout_seconds = 10
server_connect_retry_delay_millis = 250
socks_handshake_timeout_seconds = 10
tcp_open_timeout_seconds = 10
udp_flow_idle_timeout_seconds = 120
shutdown_timeout_seconds = 30
max_pending_open_bytes = 65536
max_socks_connections = 1024
max_buffered_bytes_per_session = 16777216
max_buffered_bytes_per_flow = 2097152
# Connection pool: up to this many concurrent carrier sessions. New flows are
# placed on the least-loaded carrier, so a bulk transfer that sheds/backpressures
# on one carrier does not stall latency-sensitive flows on the others.
max_carrier_sessions = 4
