# Example UK server configuration.

listen = "127.0.0.1:9443"
observability_listen = "127.0.0.1:9090"
cert_path = "server-cert.pem"
key_path = "server-key.pem"
policy_path = "policy.toml"
auth_skew_seconds = 30

[limits]
max_pre_auth_bytes = 4096
max_frame_size = 65536
max_sessions = 1024
max_handshakes = 1024
max_streams = 64
max_udp_flows = 64
max_outbound_dials_per_session = 16
max_buffered_bytes_per_session = 16777216
idle_timeout_seconds = 300
max_buffered_bytes_per_flow = 2097152
handshake_timeout_seconds = 10
target_connect_timeout_seconds = 10
tcp_half_close_timeout_seconds = 30
udp_flow_idle_timeout_seconds = 120
shutdown_timeout_seconds = 30
replay_cache_window_seconds = 300
replay_cache_max_entries = 65536

[[credentials]]
key_id = "local-dev"
secret = "replace-with-a-long-random-shared-secret"
status = "active"
policy_group = "default"
